{% macro book_form(genres, form_data, book=None, is_edit=False) %}
<div class="mb-3">
    <label for="title" class="form-label">Название *</label>
    <input type="text" class="form-control" id="title" name="title"
           value="{{ form_data.get('title', book.title if book else '') }}" required>
</div>

<div class="mb-3">
    <label for="description" class="form-label">Краткое описание * <small class="text-muted">(Markdown)</small></label>
    <textarea class="form-control" id="description" name="description"
              rows="6">{{ form_data.get('description', book.description if book else '') }}</textarea>
</div>

<div class="row">
    <div class="col-md-4 mb-3">
        <label for="year" class="form-label">Год издания *</label>
        <input type="number" class="form-control" id="year" name="year"
               min="1000" max="2100"
               value="{{ form_data.get('year', book.year if book else '') }}" required>
    </div>
    <div class="col-md-4 mb-3">
        <label for="publisher" class="form-label">Издательство *</label>
        <input type="text" class="form-control" id="publisher" name="publisher"
               value="{{ form_data.get('publisher', book.publisher if book else '') }}" required>
    </div>
    <div class="col-md-4 mb-3">
        <label for="pages" class="form-label">Объём (стр.) *</label>
        <input type="number" class="form-control" id="pages" name="pages"
               min="1"
               value="{{ form_data.get('pages', book.pages if book else '') }}" required>
    </div>
</div>

<div class="mb-3">
    <label for="author" class="form-label">Автор *</label>
    <input type="text" class="form-control" id="author" name="author"
           value="{{ form_data.get('author', book.author if book else '') }}" required>
</div>

<div class="mb-3">
    <label for="genre_ids" class="form-label">Жанры * <small class="text-muted">(можно выбрать несколько)</small></label>
    <select class="form-select" id="genre_ids" name="genre_ids" multiple required size="6">
        {% set selected_ids = form_data.getlist('genre_ids')|map('int')|list if form_data else
                              (book.genres|map(attribute='id')|list if book else []) %}
        {% for genre in genres %}
        <option value="{{ genre.id }}"
            {% if genre.id in selected_ids %}selected{% endif %}>
            {{ genre.name }}
        </option>
        {% endfor %}
    </select>
</div>

{% if not is_edit %}
<div class="mb-3">
    <label for="cover" class="form-label">Обложка *</label>
    <input type="file" class="form-control" id="cover" name="cover"
           accept="image/*" required>
</div>
{% endif %}
{% endmacro %}
