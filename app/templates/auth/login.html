{% extends 'base.html' %}

{% block title %}Вход — Электронная библиотека{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h2 class="card-title mb-4 text-center">Вход в систему</h2>
                <form method="POST">
                    <div class="mb-3">
                        <label for="login" class="form-label">Логин</label>
                        <input type="text" class="form-control" id="login" name="login"
                               value="{{ request.form.get('login', '') }}" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Пароль</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <div class="mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="remember" name="remember">
                            <label class="form-check-label" for="remember">Запомнить меня</label>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Войти</button>
                    <div class="text-center mt-3">
                        <span class="text-muted">Нет аккаунта?</span>
                        <a href="{{ url_for('auth.register') }}">Зарегистрироваться</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
